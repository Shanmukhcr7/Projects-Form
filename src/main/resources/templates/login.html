<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login - Dashboard</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <!-- Custom CSS -->
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <style>
        .login-card {
            max-width: 450px;
            width: 100%;
        }

        .login-icon-wrapper {
            width: 70px;
            height: 70px;
            background: rgba(99, 102, 241, 0.1);
            color: var(--primary);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
            margin: 0 auto 1.5rem auto;
        }
    </style>
</head>

<body class="d-flex align-items-center justify-content-center"
    style="min-height: 100vh; background-color: var(--bg-color);">

    <div class="login-card mx-auto px-3">
        <div class="saas-card py-5">
            <div class="text-center mb-4">
                <div class="login-icon-wrapper">
                    <i class="fa-solid fa-lock"></i>
                </div>
                <h3 class="fw-bold text-dark">Admin Login</h3>
                <p class="text-muted small">Sign in to access the secure dashboard.</p>
            </div>

            <!-- Error Message -->
            <div th:if="${error}" class="alert alert-danger d-flex align-items-center mb-4 py-2" role="alert"
                style="font-size: 0.9rem;">
                <i class="fa-solid fa-circle-exclamation me-2"></i>
                <div th:text="${error}">Invalid credentials</div>
            </div>

            <form action="#" th:action="@{/login}" method="post">
                <div class="form-floating input-icon-wrapper mb-3">
                    <i class="fa-solid fa-user input-icon"></i>
                    <input type="text" class="form-control" id="username" name="username" placeholder="Username"
                        required>
                    <label for="username">Username</label>
                </div>

                <div class="form-floating input-icon-wrapper mb-4">
                    <i class="fa-solid fa-key input-icon"></i>
                    <input type="password" class="form-control" id="password" name="password" placeholder="Password"
                        required>
                    <label for="password">Password</label>
                </div>

                <div class="d-grid mb-3">
                    <button type="submit" class="btn btn-saas btn-lg">
                        <i class="fa-solid fa-right-to-bracket me-2"></i> Sign In
                    </button>
                </div>

                <div class="text-center mt-4">
                    <a href="/" class="text-decoration-none text-muted small"><i
                            class="fa-solid fa-arrow-left me-1"></i> Back to Submission Form</a>
                </div>
            </form>
        </div>
    </div>

</body>

</html>
