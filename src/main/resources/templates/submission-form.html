<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Final Project Submission</title>

    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Font Awesome for sleek icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <!-- Custom SaaS CSS -->
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>

<body>

    <!-- Hero Banner -->
    <header class="hero-banner">
        <div class="container">
            <h1 class="hero-title fade-up"><i class="fa-solid fa-rocket me-2"></i>Project Launchpad</h1>
            <p class="hero-subtitle fade-up delay-1">Submit your final project details and documentation below.</p>
        </div>
    </header>

    <!-- Main Container -->
    <main class="container form-wrapper">
        <div class="row justify-content-center">
            <div class="col-lg-8 col-md-10">

                <div class="saas-card fade-up delay-2">

                    <div class="mb-4 text-muted small">
                        <i class="fa-solid fa-circle-info me-1"></i> All fields marked with an asterisk (*) are
                        required.
                    </div>

                    <form action="#" th:action="@{/submit}" th:object="${project}" method="post" novalidate>

                        <div class="row g-3">
                            <!-- Roll No -->
                            <div class="col-md-6">
                                <div class="form-floating input-icon-wrapper">
                                    <i class="fa-regular fa-id-card input-icon"></i>
                                    <input type="text" class="form-control" id="rollNo" th:field="*{rollNo}"
                                        placeholder="Roll No"
                                        th:classappend="${#fields.hasErrors('rollNo')} ? 'is-invalid' : ''">
                                    <label for="rollNo">Roll Number <span class="text-danger">*</span></label>
                                    <div class="invalid-feedback" th:if="${#fields.hasErrors('rollNo')}"
                                        th:errors="*{rollNo}"></div>
                                </div>
                            </div>

                            <!-- Student Name -->
                            <div class="col-md-6">
                                <div class="form-floating input-icon-wrapper">
                                    <i class="fa-regular fa-user input-icon"></i>
                                    <input type="text" class="form-control" id="studentName" th:field="*{studentName}"
                                        placeholder="Name"
                                        th:classappend="${#fields.hasErrors('studentName')} ? 'is-invalid' : ''">
                                    <label for="studentName">Full Name <span class="text-danger">*</span></label>
                                    <div class="invalid-feedback" th:if="${#fields.hasErrors('studentName')}"
                                        th:errors="*{studentName}"></div>
                                </div>
                            </div>

                            <!-- Email -->
                            <div class="col-md-12">
                                <div class="form-floating input-icon-wrapper">
                                    <i class="fa-regular fa-envelope input-icon"></i>
                                    <input type="email" class="form-control" id="emailId" th:field="*{emailId}"
                                        placeholder="Email"
                                        th:classappend="${#fields.hasErrors('emailId')} ? 'is-invalid' : ''">
                                    <label for="emailId">College Email Address <span
                                            class="text-danger">*</span></label>
                                    <div class="invalid-feedback" th:if="${#fields.hasErrors('emailId')}"
                                        th:errors="*{emailId}"></div>
                                </div>
                            </div>

                            <!-- Branch -->
                            <div class="col-md-6">
                                <div class="form-floating input-icon-wrapper">
                                    <i class="fa-solid fa-code-branch input-icon"></i>
                                    <select class="form-select" id="branch" th:field="*{branch}"
                                        th:classappend="${#fields.hasErrors('branch')} ? 'is-invalid' : ''">
                                        <option value="" disabled selected>Select Branch</option>
                                        <option value="AI">AI</option>
                                        <option value="AIML">AIML</option>
                                        <option value="CSE">CSE</option>
                                        <option value="IT">IT</option>
                                        <option value="DS">DS</option>
                                        <option value="ECE">ECE</option>
                                        <option value="EEE">EEE</option>
                                        <option value="MECHANICAL">MECHANICAL</option>
                                    </select>
                                    <label for="branch">Branch <span class="text-danger">*</span></label>
                                    <div class="invalid-feedback" th:if="${#fields.hasErrors('branch')}"
                                        th:errors="*{branch}"></div>
                                </div>
                            </div>

                            <!-- Section -->
                            <div class="col-md-6">
                                <div class="form-floating input-icon-wrapper">
                                    <i class="fa-solid fa-users-viewfinder input-icon"></i>
                                    <select class="form-select" id="section" th:field="*{section}"
                                        th:classappend="${#fields.hasErrors('section')} ? 'is-invalid' : ''">
                                        <option value="" disabled selected>Select Section</option>
                                        <option value="A">A</option>
                                        <option value="B">B</option>
                                        <option value="C">C</option>
                                        <option value="D">D</option>
                                        <option value="E">E</option>
                                        <option value="F">F</option>
                                        <option value="G">G</option>
                                        <option value="H">H</option>
                                        <option value="I">I</option>
                                        <option value="J">J</option>
                                        <option value="K">K</option>
                                        <option value="L">L</option>
                                        <option value="M">M</option>
                                        <option value="N">N</option>
                                        <option value="O">O</option>
                                        <option value="P">P</option>
                                        <option value="Q">Q</option>
                                        <option value="R">R</option>
                                        <option value="S">S</option>
                                        <option value="T">T</option>
                                        <option value="U">U</option>
                                        <option value="V">V</option>
                                    </select>
                                    <label for="section">Section <span class="text-danger">*</span></label>
                                    <div class="invalid-feedback" th:if="${#fields.hasErrors('section')}"
                                        th:errors="*{section}"></div>
                                </div>
                            </div>

                            <!-- Content Divider -->
                            <div class="col-12 my-2">
                                <hr class="text-muted opacity-25">
                            </div>

                            <!-- Project Abstract Title -->
                            <div class="col-12">
                                <div class="form-floating input-icon-wrapper">
                                    <i class="fa-solid fa-heading input-icon"></i>
                                    <input type="text" class="form-control" id="projectAbstract"
                                        th:field="*{projectAbstract}" placeholder="Project Title"
                                        th:classappend="${#fields.hasErrors('projectAbstract')} ? 'is-invalid' : ''">
                                    <label for="projectAbstract">Project Title / Abstract <span
                                            class="text-danger">*</span></label>
                                    <div class="invalid-feedback" th:if="${#fields.hasErrors('projectAbstract')}"
                                        th:errors="*{projectAbstract}"></div>
                                </div>
                            </div>

                            <!-- About Project Textarea -->
                            <div class="col-12">
                                <div class="form-floating input-icon-wrapper textarea-wrapper">
                                    <i class="fa-solid fa-align-left input-icon"></i>
                                    <textarea class="form-control" id="aboutProject" th:field="*{aboutProject}"
                                        placeholder="Describe your project"
                                        th:classappend="${#fields.hasErrors('aboutProject')} ? 'is-invalid' : ''"></textarea>
                                    <label for="aboutProject">About Project <span class="text-danger">*</span></label>
                                    <div class="invalid-feedback" th:if="${#fields.hasErrors('aboutProject')}"
                                        th:errors="*{aboutProject}"></div>
                                </div>
                            </div>

                            <!-- Project Drive Link -->
                            <div class="col-md-6">
                                <div class="form-floating input-icon-wrapper">
                                    <i class="fa-brands fa-google-drive input-icon"></i>
                                    <input type="url" class="form-control" id="projectDriveLink"
                                        th:field="*{projectDriveLink}" placeholder="Drive Link"
                                        th:classappend="${#fields.hasErrors('projectDriveLink')} ? 'is-invalid' : ''">
                                    <label for="projectDriveLink">Project Drive Link URL <span
                                            class="text-danger">*</span></label>
                                    <div class="invalid-feedback" th:if="${#fields.hasErrors('projectDriveLink')}"
                                        th:errors="*{projectDriveLink}"></div>
                                </div>
                            </div>

                            <!-- Trainer Name -->
                            <div class="col-md-6">
                                <div class="form-floating input-icon-wrapper">
                                    <i class="fa-solid fa-chalkboard-user input-icon"></i>
                                    <input type="text" class="form-control" id="trainerName" th:field="*{trainerName}"
                                        placeholder="Trainer Name"
                                        th:classappend="${#fields.hasErrors('trainerName')} ? 'is-invalid' : ''">
                                    <label for="trainerName">Trainer / Guide Name <span
                                            class="text-danger">*</span></label>
                                    <div class="invalid-feedback" th:if="${#fields.hasErrors('trainerName')}"
                                        th:errors="*{trainerName}"></div>
                                </div>
                            </div>

                        </div> <!-- /row -->

                        <!-- Form Actions -->
                        <div class="d-flex justify-content-between align-items-center mt-5">
                            <button type="reset" class="btn btn-outline-saas">
                                <i class="fa-solid fa-rotate-right me-2"></i>Reset
                            </button>
                            <button type="submit" class="btn btn-saas">
                                Submit Project <i class="fa-solid fa-paper-plane ms-2"></i>
                            </button>
                        </div>

                    </form>
                </div>
            </div>
        </div>
    </main>

    <!-- Bootstrap 5 JS Bundle -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
