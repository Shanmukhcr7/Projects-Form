<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Submission Successful</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <!-- Custom CSS -->
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>

<body class="d-flex align-items-center justify-content-center"
    style="min-height: 100vh; background-color: var(--bg-color);">

    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-8 col-lg-5 text-center">

                <div class="saas-card fade-up">
                    <div class="success-icon-wrapper border border-success">
                        <i class="fa-solid fa-check"></i>
                    </div>

                    <h2 class="fw-bold mb-3" style="color: var(--text-primary);">Submission Successful!</h2>

                    <p class="text-muted mb-4" th:text="${message}">Your response has been securely recorded in our
                        system.</p>

                    <div class="d-grid mt-4">
                        <a href="/" class="btn btn-saas">
                            <i class="fa-solid fa-arrow-left me-2"></i> Submit Another Project
                        </a>
                    </div>
                </div>

            </div>
        </div>
    </div>

</body>

</html>
